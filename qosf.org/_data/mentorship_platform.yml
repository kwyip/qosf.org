security_controls:
  - Encrypt sensitive application records in transit with HTTPS and at rest with managed database encryption.
  - Use role-based access control for organizers, reviewers, mentors, and read-only auditors.
  - Store consent, retention policy version, and access logs with each application record.
  - Keep matching exports pseudonymized by default and reveal identity only to authorized organizers.
  - Separate public Jekyll content from the private API and database layer.
  - Support deletion, correction, and export workflows for applicants who exercise privacy rights.
