application_forms:
  mentee:
    title: Mentee application
    description: Capture applicant context needed to evaluate readiness and create a fair mentor shortlist.
    fields:
      - Full name and preferred name
      - Email address, Slack/GitHub handles, and consent to be contacted
      - Country, UTC offset, weekly availability, and meeting preferences
      - Education level, current affiliation, and quantum/software background
      - Research interests, preferred project areas, and open-source experience
      - Motivation statement, portfolio links, and optional demographic self-identification
      - Data retention consent and privacy acknowledgement
  mentor:
    title: Mentor application
    description: Capture mentor capacity, project ideas, availability, and constraints for safe matching.
    fields:
      - Full name, email address, affiliation, and public profile links
      - Timezone, mentoring availability, expected meeting cadence, and preferred cohort dates
      - Research interests, project ideas, technical stack, and required mentee background
      - Maximum mentees or teams, co-mentor preferences, and conflict-of-interest disclosures
      - Communication expectations, accessibility constraints, and code of conduct acknowledgement
      - Data retention consent and privacy acknowledgement
matching_weights:
  - factor: Research interest overlap
    weight: 35
    detail: Shared tags between mentee interests, mentor expertise, and proposed project areas.
  - factor: Timezone compatibility
    weight: 25
    detail: Meeting-window overlap, UTC offset distance, and preferred cadence.
  - factor: Readiness and educational level
    weight: 20
    detail: Applicant background compared with mentor/project prerequisites.
  - factor: Availability and capacity
    weight: 10
    detail: Weekly hours, mentor capacity, and expected project load.
  - factor: Open-source and collaboration fit
    weight: 10
    detail: GitHub experience, communication preferences, and team-size preferences.
